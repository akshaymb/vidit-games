<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dino Jump! 🦕❄️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            background: #1a1a2e;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: linear-gradient(180deg, #16213e 0%, #0f3460 60%, #1a1a2e 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-size: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 20;
        }
        #game-over h1 { font-size: 2.5em; margin-bottom: 10px; }
        #game-over p { font-size: 1.3em; margin-bottom: 20px; }
        #game-over button {
            font-family: 'Comic Sans MS', cursive;
            font-size: 1.3em;
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            background: #e94560;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }
        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 20;
        }
        #start-screen h1 { font-size: 2.5em; margin-bottom: 10px; }
        #start-screen p { font-size: 1.2em; margin-bottom: 20px; opacity: 0.8; }
        #start-screen button {
            font-family: 'Comic Sans MS', cursive;
            font-size: 1.5em;
            padding: 16px 40px;
            border: none;
            border-radius: 12px;
            background: #4ecdc4;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 15;
            pointer-events: none;
        }
        .ctrl-btn {
            pointer-events: all;
            font-size: 2.2em;
            width: 90px;
            height: 90px;
            border: none;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.1s;
        }
        .ctrl-btn:active { transform: scale(0.85); }
        #btn-arrow { background: #e74c3c; }
        #btn-jump { background: #4ecdc4; }
    </style>
</head>
<body>
    <div id="ui">
        <span id="lives">❤️❤️❤️❤️❤️</span>
        <span id="score">Score: 0</span>
    </div>
    <div id="start-screen">
        <h1>🦕 Dino vs Dragon! ❄️</h1>
        <p>Dragon shoots ice! Dino fights back!<br>🏹 = Shoot Arrow &nbsp; ⬆️ = Jump</p>
        <button id="start-btn">START</button>
    </div>
    <div id="game-over">
        <h1>💥 Game Over!</h1>
        <p id="final-score">Score: 0</p>
        <button id="restart-btn">Play Again 🎮</button>
    </div>
    <div id="controls">
        <button class="ctrl-btn" id="btn-arrow">🏹</button>
        <button class="ctrl-btn" id="btn-jump">⬆️</button>
    </div>
    <canvas id="game"></canvas>

    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Game state
    let gameRunning = false;
    let lives = 5;
    let score = 0;
    let invincible = 0;
    let fireSpeed = 4;
    let fireInterval = 2000;
    let lastFireTime = 0;
    let animFrame;
    let dragonHP = 10;
    let dragonMaxHP = 10;
    let dragonHitFlash = 0;
    let level = 1;

    const GROUND_OFFSET = 120; // more room for buttons
    function groundY() { return canvas.height - GROUND_OFFSET; }

    // Dino
    const dino = {
        x: 80,
        width: 50,
        height: 60,
        vy: 0,
        jumping: false,
        y: 0,
        gravity: 0.6,
        jumpForce: -14,
        frame: 0,
        frameTimer: 0
    };

    // Dragon
    const dragon = {
        x: 0,
        y: 0,
        width: 80,
        height: 70,
        frame: 0,
        frameTimer: 0,
        breathing: false,
        breathTimer: 0
    };

    // Projectiles
    let fireballs = []; // dragon ice
    let arrows = [];    // dino arrows
    let powerups = [];  // dragon power-up drops
    let particles = [];

    // Power-up state
    let shieldActive = 0; // frames remaining
    let multiArrow = false;
    let multiArrowTimer = 0;
    const SHIELD_DURATION = 600; // ~10 seconds at 60fps
    const MULTI_DURATION = 480; // ~8 seconds

    function resetGame() {
        lives = 5;
        score = 0;
        invincible = 0;
        fireSpeed = 4;
        fireInterval = 2000;
        lastFireTime = Date.now();
        fireballs = [];
        arrows = [];
        powerups = [];
        particles = [];
        level = 1;
        dragonHP = 10;
        dragonMaxHP = 10;
        shieldActive = 0;
        multiArrow = false;
        multiArrowTimer = 0;
        dino.y = groundY() - dino.height;
        dino.vy = 0;
        dino.jumping = false;
        dragon.x = canvas.width - 130;
        dragon.y = groundY() - dino.height - 10;
        dragon.breathing = false;
        dragonHitFlash = 0;
        updateUI();
    }

    function updateUI() {
        document.getElementById('lives').textContent = '❤️'.repeat(lives) + '🖤'.repeat(5 - lives);
        document.getElementById('score').textContent = 'Score: ' + score;
    }

    // Drawing
    function drawGround() {
        const gy = groundY();
        ctx.fillStyle = '#2d6a4f';
        ctx.fillRect(0, gy, canvas.width, canvas.height - gy);
        ctx.fillStyle = '#40916c';
        for (let i = 0; i < canvas.width; i += 15) {
            ctx.fillRect(i, gy - 3, 3, 6);
        }
    }

    function drawDino() {
        const x = dino.x;
        const y = dino.y;
        const flash = invincible > 0 && Math.floor(invincible / 5) % 2 === 0;
        if (flash) ctx.globalAlpha = 0.4;

        // Body
        ctx.fillStyle = '#4ecdc4';
        ctx.beginPath();
        ctx.ellipse(x + 25, y + 35, 18, 22, 0, 0, Math.PI * 2);
        ctx.fill();

        // Neck
        ctx.fillStyle = '#4ecdc4';
        ctx.beginPath();
        ctx.moveTo(x + 15, y + 20);
        ctx.quadraticCurveTo(x + 10, y + 5, x + 8, y - 5);
        ctx.lineTo(x + 18, y - 5);
        ctx.quadraticCurveTo(x + 20, y + 5, x + 25, y + 18);
        ctx.fill();

        // Head (facing RIGHT toward dragon)
        ctx.fillStyle = '#3db8a9';
        ctx.beginPath();
        ctx.ellipse(x + 35, y - 5, 12, 10, 0.3, 0, Math.PI * 2);
        ctx.fill();

        // Snout
        ctx.fillStyle = '#3db8a9';
        ctx.beginPath();
        ctx.ellipse(x + 46, y - 3, 7, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Eye
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(x + 38, y - 9, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(x + 39, y - 9, 2, 0, Math.PI * 2);
        ctx.fill();

        // Legs
        ctx.fillStyle = '#3db8a9';
        if (!dino.jumping) {
            dino.frameTimer++;
            if (dino.frameTimer > 8) { dino.frame = (dino.frame + 1) % 2; dino.frameTimer = 0; }
            const legOffset = dino.frame === 0 ? 0 : 4;
            ctx.fillRect(x + 14, y + 52, 7, 12 - legOffset);
            ctx.fillRect(x + 28, y + 52, 7, 8 + legOffset);
        } else {
            ctx.fillRect(x + 16, y + 50, 7, 8);
            ctx.fillRect(x + 28, y + 50, 7, 8);
        }

        // Tail (extends LEFT, behind dino)
        ctx.strokeStyle = '#3db8a9';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x + 8, y + 35);
        ctx.quadraticCurveTo(x - 10, y + 28, x - 15, y + 38);
        ctx.quadraticCurveTo(x - 18, y + 45, x - 10, y + 42);
        ctx.stroke();
        ctx.lineCap = 'butt';

        // Back spikes
        ctx.fillStyle = '#ff6b6b';
        const spikes = [{x: x+22, y: y+5}, {x: x+27, y: y+14}, {x: x+30, y: y+22}];
        spikes.forEach(s => {
            ctx.beginPath();
            ctx.moveTo(s.x - 3, s.y + 4);
            ctx.lineTo(s.x, s.y - 4);
            ctx.lineTo(s.x + 3, s.y + 4);
            ctx.fill();
        });

        ctx.globalAlpha = 1;
    }

    function drawDragon() {
        const x = dragon.x;
        const y = dragon.y;

        if (dragonHitFlash > 0) ctx.globalAlpha = 0.5;

        // Wings
        dragon.frameTimer++;
        if (dragon.frameTimer > 12) { dragon.frame = (dragon.frame + 1) % 2; dragon.frameTimer = 0; }
        ctx.fillStyle = '#c0392b';
        const wingFlap = dragon.frame === 0 ? -10 : 10;
        ctx.beginPath();
        ctx.moveTo(x + 40, y + 20);
        ctx.lineTo(x + 70, y + wingFlap);
        ctx.lineTo(x + 80, y + 30);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x + 40, y + 20);
        ctx.lineTo(x + 10, y + wingFlap);
        ctx.lineTo(x, y + 30);
        ctx.fill();

        // Body
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.ellipse(x + 40, y + 35, 25, 20, 0, 0, Math.PI * 2);
        ctx.fill();

        // Head
        ctx.fillStyle = '#c0392b';
        ctx.beginPath();
        ctx.ellipse(x + 15, y + 25, 15, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        // Eye
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.arc(x + 10, y + 22, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(x + 9, y + 22, 2, 0, Math.PI * 2);
        ctx.fill();

        // Horns
        ctx.fillStyle = '#f39c12';
        ctx.beginPath();
        ctx.moveTo(x + 18, y + 14);
        ctx.lineTo(x + 22, y + 4);
        ctx.lineTo(x + 25, y + 14);
        ctx.fill();

        // Mouth (open when breathing)
        if (dragon.breathing) {
            ctx.fillStyle = '#00bfff';
            ctx.beginPath();
            ctx.moveTo(x + 2, y + 28);
            ctx.lineTo(x - 5, y + 32);
            ctx.lineTo(x + 2, y + 36);
            ctx.fill();
        }

        // Tail
        ctx.strokeStyle = '#c0392b';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(x + 60, y + 35);
        ctx.quadraticCurveTo(x + 80, y + 50, x + 75, y + 60);
        ctx.stroke();
        ctx.fillStyle = '#f39c12';
        ctx.beginPath();
        ctx.moveTo(x + 72, y + 58);
        ctx.lineTo(x + 78, y + 65);
        ctx.lineTo(x + 70, y + 65);
        ctx.fill();

        ctx.globalAlpha = 1;

        // HP bar above dragon
        const barWidth = 60;
        const barX = x + 10;
        const barY = y - 15;
        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barWidth, 8);
        ctx.fillStyle = dragonHP > 3 ? '#2ecc71' : '#e74c3c';
        ctx.fillRect(barX, barY, barWidth * (dragonHP / dragonMaxHP), 8);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeRect(barX, barY, barWidth, 8);
    }

    function drawIceball(fb) {
        const gradient = ctx.createRadialGradient(fb.x, fb.y, 0, fb.x, fb.y, fb.radius * 2);
        gradient.addColorStop(0, 'rgba(180, 230, 255, 0.6)');
        gradient.addColorStop(1, 'rgba(100, 200, 255, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(fb.x, fb.y, fb.radius * 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#00bfff';
        ctx.beginPath();
        ctx.arc(fb.x, fb.y, fb.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#e0f7ff';
        ctx.beginPath();
        ctx.arc(fb.x - 2, fb.y - 2, fb.radius * 0.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#b4e6ff';
        ctx.lineWidth = 2;
        for (let i = 0; i < 4; i++) {
            const angle = (i / 4) * Math.PI * 2 + Date.now() / 500;
            ctx.beginPath();
            ctx.moveTo(fb.x, fb.y);
            ctx.lineTo(fb.x + Math.cos(angle) * fb.radius * 1.5, fb.y + Math.sin(angle) * fb.radius * 1.5);
            ctx.stroke();
        }

        for (let i = 0; i < 2; i++) {
            particles.push({
                x: fb.x + fb.radius + Math.random() * 10,
                y: fb.y + (Math.random() - 0.5) * 10,
                vx: Math.random() * 2,
                vy: (Math.random() - 0.5) * 2,
                life: 15,
                color: Math.random() > 0.5 ? '#00bfff' : '#e0f7ff',
                size: Math.random() * 4 + 2
            });
        }
    }

    function drawArrow(a) {
        // Arrow shaft
        ctx.strokeStyle = '#f39c12';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(a.x - 25, a.y);
        ctx.stroke();

        // Arrow head
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(a.x - 8, a.y - 5);
        ctx.lineTo(a.x - 8, a.y + 5);
        ctx.fill();

        // Feathers
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.moveTo(a.x - 22, a.y);
        ctx.lineTo(a.x - 28, a.y - 4);
        ctx.lineTo(a.x - 25, a.y);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(a.x - 22, a.y);
        ctx.lineTo(a.x - 28, a.y + 4);
        ctx.lineTo(a.x - 25, a.y);
        ctx.fill();
    }

    function drawParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.globalAlpha = p.life / 20;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function spawnExplosion(x, y, colors) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                life: 20 + Math.random() * 10,
                color: colors[Math.floor(Math.random() * colors.length)],
                size: Math.random() * 6 + 3
            });
        }
    }

    function jump() {
        if (!dino.jumping && gameRunning) {
            dino.vy = dino.jumpForce;
            dino.jumping = true;
        }
    }

    function shootArrow() {
        if (!gameRunning) return;
        if (multiArrow) {
            // Shoot 3 arrows in a spread
            arrows.push({ x: dino.x + 50, y: dino.y + 15, speed: 9 });
            arrows.push({ x: dino.x + 50, y: dino.y + 25, speed: 9 });
            arrows.push({ x: dino.x + 50, y: dino.y + 35, speed: 9 });
        } else {
            arrows.push({ x: dino.x + 50, y: dino.y + 20, speed: 8 });
        }
    }

    function drawPowerup(p) {
        // Glowing orb
        const colors = { shield: '#00bfff', life: '#ff6b6b', multi: '#f1c40f' };
        const emojis = { shield: '🛡️', life: '❤️', multi: '⚡' };
        const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2);
        glow.addColorStop(0, colors[p.type] + '99');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * 2, 0, Math.PI * 2);
        ctx.fill();

        // Orb
        ctx.fillStyle = colors[p.type];
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();

        // Emoji
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emojis[p.type], p.x, p.y);
        ctx.textAlign = 'start';
        ctx.textBaseline = 'alphabetic';

        // Sparkle trail
        particles.push({
            x: p.x + p.radius + Math.random() * 5,
            y: p.y + (Math.random() - 0.5) * 8,
            vx: Math.random() * 1.5,
            vy: (Math.random() - 0.5) * 1.5,
            life: 12,
            color: colors[p.type],
            size: Math.random() * 3 + 2
        });
    }

    function collectPowerup(p) {
        if (p.type === 'shield') {
            shieldActive = SHIELD_DURATION;
            spawnExplosion(dino.x + 25, dino.y + 30, ['#00bfff', '#7fdbff', '#e0f7ff', '#fff']);
        } else if (p.type === 'life') {
            if (lives < 5) lives++;
            spawnExplosion(dino.x + 25, dino.y + 30, ['#ff6b6b', '#ff0000', '#ff9999', '#fff']);
        } else if (p.type === 'multi') {
            multiArrow = true;
            multiArrowTimer = MULTI_DURATION;
            spawnExplosion(dino.x + 25, dino.y + 30, ['#f1c40f', '#f39c12', '#ffcc00', '#fff']);
        }
        updateUI();
    }

    function checkPowerupCollision(p) {
        const dinoBox = { x: dino.x + 5, y: dino.y, w: dino.width, h: dino.height };
        const dist = Math.sqrt(
            Math.pow(p.x - (dinoBox.x + dinoBox.w / 2), 2) +
            Math.pow(p.y - (dinoBox.y + dinoBox.h / 2), 2)
        );
        return dist < p.radius + 25;
    }

    function spawnIce() {
        const now = Date.now();
        if (now - lastFireTime > fireInterval) {
            lastFireTime = now;
            dragon.breathing = true;
            dragon.breathTimer = 20;

            // 20% chance to shoot a power-up instead of ice
            if (Math.random() < 0.2) {
                const types = ['shield', 'life', 'multi'];
                const type = types[Math.floor(Math.random() * types.length)];
                powerups.push({
                    x: dragon.x,
                    y: groundY() - 30,
                    speed: fireSpeed * 0.7,
                    type: type,
                    radius: 16
                });
            } else {
                fireballs.push({
                    x: dragon.x,
                    y: groundY() - 30,
                    radius: 12 + Math.random() * 6,
                    speed: fireSpeed + Math.random() * 1.5
                });
            }

            if (fireInterval > 800) fireInterval -= 15;
            if (fireSpeed < 7) fireSpeed += 0.03;
        }
    }

    function checkDinoCollision(fb) {
        if (invincible > 0 || shieldActive > 0) return false;
        const dinoBox = { x: dino.x + 10, y: dino.y + 5, w: dino.width - 20, h: dino.height - 10 };
        const dist = Math.sqrt(
            Math.pow(fb.x - (dinoBox.x + dinoBox.w / 2), 2) +
            Math.pow(fb.y - (dinoBox.y + dinoBox.h / 2), 2)
        );
        return dist < fb.radius + 20;
    }

    function checkArrowHitDragon(a) {
        return a.x >= dragon.x && a.x <= dragon.x + dragon.width &&
               a.y >= dragon.y && a.y <= dragon.y + dragon.height;
    }

    function hit() {
        lives--;
        invincible = 60;
        spawnExplosion(dino.x + 25, dino.y + 30, ['#00bfff', '#b4e6ff', '#e0f7ff', '#7fdbff']);
        updateUI();
        if (lives <= 0) gameOver();
    }

    function dragonHit() {
        dragonHP--;
        dragonHitFlash = 15;
        score += 25;
        spawnExplosion(dragon.x + 30, dragon.y + 30, ['#ff6600', '#ffcc00', '#ff3300', '#fff']);
        updateUI();
        if (dragonHP <= 0) {
            // Dragon defeated! Level up!
            level++;
            dragonMaxHP = 10 + level * 3;
            dragonHP = dragonMaxHP;
            fireSpeed = Math.min(4 + level * 0.5, 9);
            fireInterval = Math.max(2000 - level * 150, 600);
            score += 100;
            spawnExplosion(dragon.x + 40, dragon.y + 35, ['#f1c40f', '#e74c3c', '#ff6600', '#fff']);
            updateUI();
        }
    }

    function gameOver() {
        gameRunning = false;
        document.getElementById('game-over').style.display = 'block';
        document.getElementById('final-score').textContent = 'Score: ' + score + ' | Level: ' + level;
        cancelAnimationFrame(animFrame);
    }

    function update() {
        if (!gameRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Stars
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        for (let i = 0; i < 30; i++) {
            const sx = (i * 97 + score * 0.1) % canvas.width;
            const sy = (i * 53) % (groundY() - 100);
            ctx.fillRect(sx, sy, 2, 2);
        }

        drawGround();

        // Level indicator
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 16px Comic Sans MS';
        ctx.fillText('Level ' + level, canvas.width / 2 - 25, 30);

        // Dino physics
        dino.vy += dino.gravity;
        dino.y += dino.vy;
        if (dino.y >= groundY() - dino.height) {
            dino.y = groundY() - dino.height;
            dino.vy = 0;
            dino.jumping = false;
        }

        // Dragon breathing animation
        if (dragon.breathTimer > 0) {
            dragon.breathTimer--;
            if (dragon.breathTimer <= 0) dragon.breathing = false;
        }
        if (dragonHitFlash > 0) dragonHitFlash--;

        // Spawn ice
        spawnIce();

        // Move ice
        for (let i = fireballs.length - 1; i >= 0; i--) {
            fireballs[i].x -= fireballs[i].speed;
            if (fireballs[i].x < -20) {
                fireballs.splice(i, 1);
                score += 5;
                updateUI();
                continue;
            }
            if (checkDinoCollision(fireballs[i])) {
                fireballs.splice(i, 1);
                if (shieldActive > 0) {
                    // Shield absorbs hit
                    spawnExplosion(dino.x + 25, dino.y + 30, ['#00bfff', '#fff']);
                } else {
                    hit();
                }
            }
        }

        // Move power-ups
        for (let i = powerups.length - 1; i >= 0; i--) {
            powerups[i].x -= powerups[i].speed;
            if (powerups[i].x < -20) {
                powerups.splice(i, 1);
                continue;
            }
            if (checkPowerupCollision(powerups[i])) {
                collectPowerup(powerups[i]);
                powerups.splice(i, 1);
            }
        }

        // Shield timer
        if (shieldActive > 0) shieldActive--;

        // Multi-arrow timer
        if (multiArrowTimer > 0) {
            multiArrowTimer--;
            if (multiArrowTimer <= 0) multiArrow = false;
        }

        // Move arrows
        for (let i = arrows.length - 1; i >= 0; i--) {
            arrows[i].x += arrows[i].speed;
            if (arrows[i].x > canvas.width + 30) {
                arrows.splice(i, 1);
                continue;
            }
            if (checkArrowHitDragon(arrows[i])) {
                arrows.splice(i, 1);
                dragonHit();
            }
        }

        // Invincibility
        if (invincible > 0) invincible--;

        // Draw
        drawDragon();
        fireballs.forEach(drawIceball);
        powerups.forEach(drawPowerup);
        arrows.forEach(drawArrow);
        drawParticles();
        drawDino();

        // Shield visual around dino
        if (shieldActive > 0) {
            ctx.strokeStyle = 'rgba(0, 191, 255, ' + (0.4 + Math.sin(Date.now()/200)*0.2) + ')';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.ellipse(dino.x + 25, dino.y + 30, 35, 38, 0, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Active power-up indicators
        let indicatorY = 55;
        ctx.font = '14px Comic Sans MS';
        if (shieldActive > 0) {
            ctx.fillStyle = '#00bfff';
            ctx.fillText('🛡️ ' + Math.ceil(shieldActive/60) + 's', 15, indicatorY);
            indicatorY += 20;
        }
        if (multiArrow) {
            ctx.fillStyle = '#f1c40f';
            ctx.fillText('⚡ ' + Math.ceil(multiArrowTimer/60) + 's', 15, indicatorY);
        }

        animFrame = requestAnimationFrame(update);
    }

    // Controls — keyboard
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault();
            jump();
        }
        if (e.code === 'KeyA' || e.code === 'ArrowRight') {
            e.preventDefault();
            shootArrow();
        }
    });

    // Controls — buttons
    document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
    document.getElementById('btn-jump').addEventListener('click', (e) => { e.preventDefault(); jump(); });
    document.getElementById('btn-arrow').addEventListener('touchstart', (e) => { e.preventDefault(); shootArrow(); });
    document.getElementById('btn-arrow').addEventListener('click', (e) => { e.preventDefault(); shootArrow(); });

    // Start
    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-screen').style.display = 'none';
        resetGame();
        gameRunning = true;
        update();
    });

    // Restart
    document.getElementById('restart-btn').addEventListener('click', () => {
        document.getElementById('game-over').style.display = 'none';
        resetGame();
        gameRunning = true;
        update();
    });
    </script>
</body>
</html>
