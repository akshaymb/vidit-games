<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dino Jump! 🦕🔥</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            background: #1a1a2e;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: linear-gradient(180deg, #16213e 0%, #0f3460 60%, #1a1a2e 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-size: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 20;
        }
        #game-over h1 { font-size: 2.5em; margin-bottom: 10px; }
        #game-over p { font-size: 1.3em; margin-bottom: 20px; }
        #game-over button {
            font-family: 'Comic Sans MS', cursive;
            font-size: 1.3em;
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            background: #e94560;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }
        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 20;
        }
        #start-screen h1 { font-size: 2.5em; margin-bottom: 10px; }
        #start-screen p { font-size: 1.2em; margin-bottom: 20px; opacity: 0.8; }
        #start-screen button {
            font-family: 'Comic Sans MS', cursive;
            font-size: 1.5em;
            padding: 16px 40px;
            border: none;
            border-radius: 12px;
            background: #4ecdc4;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div id="ui">
        <span id="lives">❤️❤️❤️❤️❤️</span>
        <span id="score">Score: 0</span>
    </div>
    <div id="start-screen">
        <h1>🦕 Dino Jump! 🔥</h1>
        <p>A dragon is shooting fire!<br>Tap or press Space to jump!</p>
        <button id="start-btn">START</button>
    </div>
    <div id="game-over">
        <h1>💥 Game Over!</h1>
        <p id="final-score">Score: 0</p>
        <button id="restart-btn">Play Again 🎮</button>
    </div>
    <canvas id="game"></canvas>

    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Responsive canvas
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Game state
    let gameRunning = false;
    let lives = 5;
    let score = 0;
    let invincible = 0;
    let fireSpeed = 4;
    let fireInterval = 2000;
    let lastFireTime = 0;
    let animFrame;

    // Ground
    const GROUND_OFFSET = 80;
    function groundY() { return canvas.height - GROUND_OFFSET; }

    // Dino
    const dino = {
        x: 80,
        width: 50,
        height: 60,
        vy: 0,
        jumping: false,
        y: 0,
        gravity: 0.6,
        jumpForce: -14,
        frame: 0,
        frameTimer: 0
    };

    // Dragon
    const dragon = {
        x: 0,
        y: 0,
        width: 80,
        height: 70,
        frame: 0,
        frameTimer: 0,
        breathing: false,
        breathTimer: 0
    };

    // Fireballs
    let fireballs = [];

    // Particles
    let particles = [];

    function resetGame() {
        lives = 5;
        score = 0;
        invincible = 0;
        fireSpeed = 4;
        fireInterval = 2000;
        lastFireTime = Date.now();
        fireballs = [];
        particles = [];
        dino.y = groundY() - dino.height;
        dino.vy = 0;
        dino.jumping = false;
        dragon.x = canvas.width - 130;
        dragon.y = groundY() - dino.height - 10;
        dragon.breathing = false;
        updateUI();
    }

    function updateUI() {
        document.getElementById('lives').textContent = '❤️'.repeat(lives) + '🖤'.repeat(5 - lives);
        document.getElementById('score').textContent = 'Score: ' + score;
    }

    // Drawing functions
    function drawGround() {
        const gy = groundY();
        ctx.fillStyle = '#2d6a4f';
        ctx.fillRect(0, gy, canvas.width, canvas.height - gy);
        // Grass blades
        ctx.fillStyle = '#40916c';
        for (let i = 0; i < canvas.width; i += 15) {
            ctx.fillRect(i, gy - 3, 3, 6);
        }
    }

    function drawDino() {
        const x = dino.x;
        const y = dino.y;
        const flash = invincible > 0 && Math.floor(invincible / 5) % 2 === 0;
        if (flash) { ctx.globalAlpha = 0.4; }

        // Body
        ctx.fillStyle = '#4ecdc4';
        ctx.beginPath();
        ctx.ellipse(x + 25, y + 35, 20, 25, 0, 0, Math.PI * 2);
        ctx.fill();

        // Head
        ctx.fillStyle = '#4ecdc4';
        ctx.beginPath();
        ctx.ellipse(x + 20, y + 10, 14, 12, -0.2, 0, Math.PI * 2);
        ctx.fill();

        // Eye
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(x + 15, y + 8, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(x + 14, y + 8, 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Legs
        ctx.fillStyle = '#3db8a9';
        if (!dino.jumping) {
            dino.frameTimer++;
            if (dino.frameTimer > 8) { dino.frame = (dino.frame + 1) % 2; dino.frameTimer = 0; }
            const legOffset = dino.frame === 0 ? 0 : 4;
            ctx.fillRect(x + 15, y + 52, 6, 12 - legOffset);
            ctx.fillRect(x + 30, y + 52, 6, 8 + legOffset);
        } else {
            // Tucked legs
            ctx.fillRect(x + 18, y + 50, 6, 8);
            ctx.fillRect(x + 28, y + 50, 6, 8);
        }

        // Tail
        ctx.strokeStyle = '#3db8a9';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(x + 42, y + 35);
        ctx.quadraticCurveTo(x + 55, y + 30, x + 50, y + 45);
        ctx.stroke();

        // Spikes
        ctx.fillStyle = '#ff6b6b';
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(x + 25 + i * 7, y + 12 + i * 6);
            ctx.lineTo(x + 28 + i * 7, y + 5 + i * 5);
            ctx.lineTo(x + 31 + i * 7, y + 12 + i * 6);
            ctx.fill();
        }

        ctx.globalAlpha = 1;
    }

    function drawDragon() {
        const x = dragon.x;
        const y = dragon.y;

        // Wings
        dragon.frameTimer++;
        if (dragon.frameTimer > 12) { dragon.frame = (dragon.frame + 1) % 2; dragon.frameTimer = 0; }
        ctx.fillStyle = '#c0392b';
        const wingFlap = dragon.frame === 0 ? -10 : 10;
        ctx.beginPath();
        ctx.moveTo(x + 40, y + 20);
        ctx.lineTo(x + 70, y + wingFlap);
        ctx.lineTo(x + 80, y + 30);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x + 40, y + 20);
        ctx.lineTo(x + 10, y + wingFlap);
        ctx.lineTo(x, y + 30);
        ctx.fill();

        // Body
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.ellipse(x + 40, y + 35, 25, 20, 0, 0, Math.PI * 2);
        ctx.fill();

        // Head
        ctx.fillStyle = '#c0392b';
        ctx.beginPath();
        ctx.ellipse(x + 15, y + 25, 15, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        // Eye
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.arc(x + 10, y + 22, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(x + 9, y + 22, 2, 0, Math.PI * 2);
        ctx.fill();

        // Horns
        ctx.fillStyle = '#f39c12';
        ctx.beginPath();
        ctx.moveTo(x + 18, y + 14);
        ctx.lineTo(x + 22, y + 4);
        ctx.lineTo(x + 25, y + 14);
        ctx.fill();

        // Mouth (open when breathing)
        if (dragon.breathing) {
            ctx.fillStyle = '#f39c12';
            ctx.beginPath();
            ctx.moveTo(x + 2, y + 28);
            ctx.lineTo(x - 5, y + 32);
            ctx.lineTo(x + 2, y + 36);
            ctx.fill();
        }

        // Tail
        ctx.strokeStyle = '#c0392b';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(x + 60, y + 35);
        ctx.quadraticCurveTo(x + 80, y + 50, x + 75, y + 60);
        ctx.stroke();
        // Tail spike
        ctx.fillStyle = '#f39c12';
        ctx.beginPath();
        ctx.moveTo(x + 72, y + 58);
        ctx.lineTo(x + 78, y + 65);
        ctx.lineTo(x + 70, y + 65);
        ctx.fill();
    }

    function drawFireball(fb) {
        // Glow
        const gradient = ctx.createRadialGradient(fb.x, fb.y, 0, fb.x, fb.y, fb.radius * 2);
        gradient.addColorStop(0, 'rgba(255, 200, 0, 0.6)');
        gradient.addColorStop(1, 'rgba(255, 80, 0, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(fb.x, fb.y, fb.radius * 2, 0, Math.PI * 2);
        ctx.fill();

        // Core
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.arc(fb.x, fb.y, fb.radius, 0, Math.PI * 2);
        ctx.fill();

        // Inner
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(fb.x - 2, fb.y - 2, fb.radius * 0.5, 0, Math.PI * 2);
        ctx.fill();

        // Trail particles
        for (let i = 0; i < 2; i++) {
            particles.push({
                x: fb.x + fb.radius + Math.random() * 10,
                y: fb.y + (Math.random() - 0.5) * 10,
                vx: Math.random() * 2,
                vy: (Math.random() - 0.5) * 2,
                life: 15,
                color: Math.random() > 0.5 ? '#ff6600' : '#ffcc00',
                size: Math.random() * 4 + 2
            });
        }
    }

    function drawParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.globalAlpha = p.life / 20;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function spawnExplosion(x, y) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                life: 20 + Math.random() * 10,
                color: ['#ff6600', '#ffcc00', '#ff0000', '#ff3300'][Math.floor(Math.random() * 4)],
                size: Math.random() * 6 + 3
            });
        }
    }

    function jump() {
        if (!dino.jumping && gameRunning) {
            dino.vy = dino.jumpForce;
            dino.jumping = true;
        }
    }

    function spawnFire() {
        const now = Date.now();
        if (now - lastFireTime > fireInterval) {
            lastFireTime = now;
            dragon.breathing = true;
            dragon.breathTimer = 20;

            // Fire shoots straight at dino ground level
            fireballs.push({
                x: dragon.x,
                y: groundY() - 30,
                radius: 12 + Math.random() * 6,
                speed: fireSpeed + Math.random() * 1.5,
                vy: 0
            });

            // Increase difficulty
            if (fireInterval > 800) fireInterval -= 20;
            if (fireSpeed < 8) fireSpeed += 0.05;
        }
    }

    function checkCollision(fb) {
        if (invincible > 0) return false;
        const dinoBox = {
            x: dino.x + 10,
            y: dino.y + 5,
            w: dino.width - 20,
            h: dino.height - 10
        };
        const dist = Math.sqrt(
            Math.pow(fb.x - (dinoBox.x + dinoBox.w / 2), 2) +
            Math.pow(fb.y - (dinoBox.y + dinoBox.h / 2), 2)
        );
        return dist < fb.radius + 20;
    }

    function hit() {
        lives--;
        invincible = 60; // frames of invincibility
        spawnExplosion(dino.x + 25, dino.y + 30);
        updateUI();
        if (lives <= 0) {
            gameOver();
        }
    }

    function gameOver() {
        gameRunning = false;
        document.getElementById('game-over').style.display = 'block';
        document.getElementById('final-score').textContent = 'Score: ' + score;
        cancelAnimationFrame(animFrame);
    }

    function update() {
        if (!gameRunning) return;

        // Clear
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Background stars
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        for (let i = 0; i < 30; i++) {
            const sx = (i * 97 + score * 0.1) % canvas.width;
            const sy = (i * 53) % (groundY() - 100);
            ctx.fillRect(sx, sy, 2, 2);
        }

        drawGround();

        // Dino physics
        dino.vy += dino.gravity;
        dino.y += dino.vy;
        if (dino.y >= groundY() - dino.height) {
            dino.y = groundY() - dino.height;
            dino.vy = 0;
            dino.jumping = false;
        }

        // Dragon breathing animation
        if (dragon.breathTimer > 0) {
            dragon.breathTimer--;
            if (dragon.breathTimer <= 0) dragon.breathing = false;
        }

        // Spawn fire
        spawnFire();

        // Move fireballs
        for (let i = fireballs.length - 1; i >= 0; i--) {
            fireballs[i].x -= fireballs[i].speed;
            fireballs[i].y += (fireballs[i].vy || 0);
            // Cap at ground level
            if (fireballs[i].y > groundY() - 15) {
                fireballs[i].y = groundY() - 15;
                fireballs[i].vy = 0;
            }
            if (fireballs[i].x < -20) {
                fireballs.splice(i, 1);
                score += 10;
                updateUI();
                continue;
            }
            if (checkCollision(fireballs[i])) {
                fireballs.splice(i, 1);
                hit();
            }
        }

        // Invincibility countdown
        if (invincible > 0) invincible--;

        // Draw everything
        drawDragon();
        fireballs.forEach(drawFireball);
        drawParticles();
        drawDino();

        // Score from survival
        if (Date.now() % 500 < 17) {
            score++;
            updateUI();
        }

        animFrame = requestAnimationFrame(update);
    }

    // Controls
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault();
            jump();
        }
    });
    document.addEventListener('touchstart', (e) => {
        e.preventDefault();
        jump();
    });
    canvas.addEventListener('click', jump);

    // Start
    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-screen').style.display = 'none';
        resetGame();
        gameRunning = true;
        update();
    });

    // Restart
    document.getElementById('restart-btn').addEventListener('click', () => {
        document.getElementById('game-over').style.display = 'none';
        resetGame();
        gameRunning = true;
        update();
    });
    </script>
</body>
</html>
