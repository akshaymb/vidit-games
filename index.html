<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidit's Game World 🎮</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .subtitle { font-size: 1.2em; opacity: 0.9; margin-bottom: 40px; }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }
        .game-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .game-card .emoji { font-size: 3em; margin-bottom: 10px; }
        .game-card .name { font-size: 1.1em; font-weight: bold; }
        .coming-soon {
            opacity: 0.6;
            font-style: italic;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>🎮 Vidit's Game World</h1>
    <p class="subtitle">Games I imagined. AI helped build them!</p>
    <div class="games-grid">
        <!-- Games will be added here as we build them -->
    </div>
    <p class="coming-soon">🚀 First game coming soon...</p>
</body>
</html>
